<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Recording</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: sans-serif;
        }
        .portal-wrapper {
            position: fixed;
            inset: 0;
            perspective: 1000px;
            perspective-origin: 50% 50%;
            background: radial-gradient(circle at center, transparent 0%, #000 80%);
            z-index: 0;
        }
        .portal-container {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            will-change: transform;
        }
        .anime-symbol {
            position: absolute;
            top: 50%;
            left: 50%;
            user-select: none;
            font-weight: 900;
            pointer-events: none;
            will-change: transform, opacity;
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="portal-wrapper">
        <div class="portal-container" id="portalContainer"></div>
    </div>

    <script>
        const MATH_SYMBOLS = ['вИС', 'ѕА', 'вИЮ', 'вИЪ', 'вИЂ', 'ќФ', 'ќЄ', 'ќї', '¬±', 'вЙ°', 'ѕЖ', 'ќ©', 'вИВ', 'вИЗ', 'вИИ'];
        const SYMBOL_COUNT = 80;
        const container = document.getElementById('portalContainer');
        const colors = [
            'rgb(0, 243, 255)',  // neon-cyan
            'rgb(176, 38, 255)', // neon-purple
            'rgb(0, 102, 255)',  // neon-blue
            'rgba(255, 255, 255, 0.8)'
        ];

        for (let i = 0; i < SYMBOL_COUNT; i++) {
            const theta = Math.random() * Math.PI * 2;
            const radius = 250 + Math.random() * 800;
            const zDepth = -3000 + Math.random() * 4000;
            const color = colors[Math.floor(Math.random() * colors.length)];
            const fontSize = 1.5 + Math.random() * 3;
            
            const x = Math.cos(theta) * radius;
            const y = Math.sin(theta) * radius;
            
            const span = document.createElement('span');
            span.className = 'anime-symbol';
            span.textContent = MATH_SYMBOLS[i % MATH_SYMBOLS.length];
            span.style.color = color;
            span.style.fontSize = `${fontSize}rem`;
            span.style.textShadow = `0 0 15px ${color}`;
            span.style.transform = `translate(-50%, -50%) translate3d(${x}px, ${y}px, ${zDepth}px) rotateZ(${Math.random() * 360}deg)`;
            
            container.appendChild(span);
        }

        // Start animation immediately
        anime({
            targets: '.portal-container',
            rotateZ: [0, 360],
            duration: 120000,
            loop: true,
            easing: 'linear'
        });

        anime({
            targets: '.anime-symbol',
            translateZ: '+=3500px',
            opacity: [
                { value: 0, duration: 0 },
                { value: 0.8, duration: 1500, easing: 'easeOutSine' },
                { value: 0, duration: 1500, delay: 2000, easing: 'easeInSine' }
            ],
            duration: () => 5000 + Math.random() * 3000,
            loop: true,
            delay: anime.stagger(30, { start: 0 }),
            easing: 'linear'
        });
    </script>
</body>
</html>
